<script> // Main

    //const cnv =nodes[0].cnv;
    //const glCtx =cnv.getContext('webgl');
    var program =null;
    const vertShader = {
        source: `
            attribute vec4 position;
            void main (){gl_Position =position;}`, 
        shader: null
    }
    const fragShader = {
        functions: [],
        source: `
            //precision highp float;
            precision mediump float;
            uniform float uTime;

            void main (){gl_FragColor =vec4(0.0,0.1,0.1,1.0);}`, 
        shader: null,
        setSource: function (col){
            this.source ="precision mediump float; \n"
            +"uniform float uTime; \n" 
            +"void main (){\n"
            +"  gl_FragColor =vec4("+col+",1.0); \n" 
            +"}";
        }, 

        compile: function (){
            
            for (let i =0; i < this.functions.length; i++){

            }
            
            this.source ="precision mediump float; \n"
            +"void main (){\n"
            
            +"  gl_FragColor =vec4("+col+",1.0); \n" 
            +"}";
        }
    }

    function getShader (_gl, type, src){ 
        let shader; 
        
        if (type == "fragment"){ 
            shader = _gl.createShader(_gl.FRAGMENT_SHADER); 
        } 
        else if (type == "vertex"){ 
            shader = _gl.createShader(_gl.VERTEX_SHADER); 
        } 

        gl.shaderSource(shader, src); 
        gl.compileShader(shader); 
        
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)){ 
            alert("Erro no shader: " + gl.getShaderInfoLog(shader)); 
            return null; 
        } 

        return shader; 
    }

    function NewProgram (_gl, vertexSource, fragmentSource){
        const vs = vertShader.shader = getShader(_gl, "vertex", vertexSource); 
        const fs = fragShader.shader = getShader(_gl, "fragment", fragmentSource); 
        const newProgram = _gl.createProgram(); 
        
        _gl.attachShader(newProgram, vs); 
        _gl.attachShader(newProgram, fs); 
        _gl.linkProgram(newProgram); 

        if (!_gl.getProgramParameter(newProgram, _gl.LINK_STATUS)) { 
            alert('Erro ao linkar programa:', _gl.getProgramInfoLog(newProgram)); 
            _gl.deleteProgram (newProgram);
            return null; 
        } 

        // desanexar e deletar shaders (já estão dentro do programa) 
        _gl.detachShader(newProgram, vs); 
        _gl.detachShader(newProgram, fs); 
        _gl.deleteShader(vs); 
        _gl.deleteShader(fs);

        return newProgram;
    }
    
    
    
    
    // pos atualizacao de codigo
    function UpdateWebGl (){
        if (program){
            gl.deleteProgram(program); // limpa o antigo 
        }

        program = NewProgram (gl, vertShader.source, fragShader.source);
        gl.useProgram(program); 
        UpdateAtributes ();
        UpdateUniforms ();
        gl.drawArrays(gl.TRIANGLES, 0, 6);
    }


    function Loop (){

        for (let i = 0; i < nodes.length; i++) nodes[i].Update ();

        requestAnimationFrame(Loop);
    }

    //Loop();
</script>
